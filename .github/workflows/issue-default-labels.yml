name: Issue Default Labels

on:
  issues:
    types: [opened, reopened, edited, unlabeled]

permissions:
  issues: write

jobs:
  ensure-domain-and-priority-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure area + priority labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const areaLabels = ["miner", "operator", "shared-contract"];
            const priorityLabels = ["priority:P0", "priority:P1"];
            const labels = (context.payload.issue.labels || []).map((l) => l.name);
            const missing = [];

            if (!labels.some((name) => areaLabels.includes(name))) {
              missing.push("shared-contract");
            }
            if (!labels.some((name) => priorityLabels.includes(name))) {
              missing.push("priority:P1");
            }

            if (missing.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: missing,
              });
              core.info(`Added missing labels: ${missing.join(", ")}`);
            } else {
              core.info("Issue already has area and priority labels.");
            }
