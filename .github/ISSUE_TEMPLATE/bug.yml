name: Bug report
description: Problem report with reproduction steps
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 何が起きたか
      placeholder: 例) 承認後に listing_status が ready にならない
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: 再現手順
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: 期待結果
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs / evidence
      description: エラー文やスクリーンショットURL
      placeholder: 例) logs/api_server.log の該当行
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - S1 (blocking)
        - S2 (high)
        - S3 (medium)
        - S4 (low)
    validations:
      required: true

