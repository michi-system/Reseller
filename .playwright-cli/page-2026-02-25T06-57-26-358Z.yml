                        - heading "Macho watch" [level=4] [ref=e1327]
                        - generic [ref=e1330]: My first G-Shock, and I'm not disappointed. It takes a little adjustment to go from 100% analogue to 100% digital, but I'm making progress. The negative display is easier to read than what the critics say, but you do need to have the right viewing angle and the right lighting to see it best. In bright sunlight I can read it best. In low light conditions the LED shows the complete face just fine. Knowing my altitude and barometric pressure is nice. The atomic timekeeping is also great, but occasionally I have to take it out of my basement and manually sync it. The resin band wears comfortably, but does get sweaty during hot active days.
