                          - contentinfo [ref=f2e75]:
                            - heading "About Us" [level=3] [ref=f2e76]
                            - generic [ref=f2e77]:
                              - paragraph [ref=f2e78]: Jomashop has been in the retail and wholesale trade of luxury goods, such as watches, fine writing instruments, handbags, fashion accessories, crystal and gift items since 1987. We pride ourselves on our ability to deliver the best prices, most varied selection and finest service for well over 25 years. Our goal has and always will be to earn the trust and satisfaction of our customers. We understand that this means providing the perfect combination of competitive pricing, an honest and reliable corps of customer service specialists that are always ready to assist, and a state of the art, New York City based fulfillment center capable of delivering products to every corner of the world.
                              - paragraph [ref=f2e79]: Our success over the years can be attributed to our loyal commitment to our customers. Whether you’re shopping with us for the first time or are a valued repeat customer, we’re here to make your shopping experience as easy, reliable and especially fun as possible. But equally as important to us is that you are comfortable and confident in shopping with us. You can always reach out to our professional customer service department online or, for a more personal experience, by telephone.
                            - heading "Shipping Information" [level=3] [ref=f2e80]
                            - generic [ref=f2e81]:
                              - heading "Domestic Shipping" [level=4] [ref=f2e82]
                              - paragraph [ref=f2e83]: Economy Shipping is free for all orders within continental United States. Please make sure that your shipping address is correct when placing the order. Higher-end orders will require a signature, so please specify an address or work address that you can be available to receive the package and sign for it; furthermore, if a PO Box is used as the shipping address, we reserve the right to ask for a physical address.
                              - paragraph [ref=f2e84]: We will refund and not reship items that are unsigned for, missed delivery, or are returned to us because of an insufficient address.
                              - heading "Economy Domestic Shipping" [level=4] [ref=f2e85]
                              - paragraph [ref=f2e86]: Orders generally ship within 2 business days from when payment has cleared. Your tracking number will be emailed to you once shipped. Orders that ship free will go at economy speed which is usually 3-5 Business Days, but can sometimes take longer (NOT guaranteed to be delivered by a certain date), if you want guaranteed options please pay for expedited shipping.
                              - heading "Expedited Domestic Shipping" [level=4] [ref=f2e87]
                              - paragraph [ref=f2e88]: "Orders generally ship within 1 business day from when payment has cleared. Your tracking number will be emailed to you once shipped. Orders are guaranteed by business days (Saturday & Sunday are not the business days). Shipping generally closes at 3PM EST. Please note: UPS does not deliver to PO Boxes, so please give us a home or work address when shipping expedited."
                              - heading "International Shipping" [level=4] [ref=f2e89]
                              - paragraph [ref=f2e90]: eBay Jomashop does NOT assess duties for an international orders, furthermore International orders are subject to applicable customs, and import duties and taxes, which are the sole responsibility of you the customer. Please contact your local customs office for details.
                              - heading "Marking items as a Gift" [level=4] [ref=f2e91]
                              - paragraph [ref=f2e92]: Under federal law we cannot not mark an item for a lower price or as a '"gift." International Orders over $500.00 may ship via UPS and are subject to UPS Delivery Fees, in addition to all applicable duties and taxes. We do ship APO/FPO addresses but a limit of $2000, and all packages will ship via USPS. To calculate the shipping rate for your order, please refer to the shipping tab.
                            - heading "International Customers" [level=3] [ref=f2e93]
                            - generic [ref=f2e94]:
                              - heading "International Shipping Duties / Tax" [level=4] [ref=f2e95]
                              - paragraph [ref=f2e96]: eBay Jomashop does NOT assess duties for an international orders, furthermore International orders are subject to applicable customs, and import duties and taxes, which are the sole responsibility of you the customer. Please contact your local customs office for details.
                              - heading "Marking items as a Gift" [level=4] [ref=f2e97]
                              - paragraph [ref=f2e98]: Under federal law we cannot not mark an item for a lower price or as a '"gift." International Orders over $500.00 may ship via UPS and are subject to UPS Delivery Fees, in addition to all applicable duties and taxes.
                            - heading "Returns Information" [level=3] [ref=f2e99]
                            - generic [ref=f2e100]:
                              - heading "30-Day Return Policy" [level=4] [ref=f2e101]
                              - paragraph [ref=f2e102]: If you are not satisfied with your purchase, you may return eligible items for an exchange or refund within 30 days, buyer pays return shipping.
                              - paragraph [ref=f2e103]: "Items must be in new condition, meaning unworn with the security tab (if applicable) intact. Conditions which will void your ability to return merchandise includes: Scratching, Breaking, Wearing items, Opening the inside of watch, Removing links, Removing the security tab on high-end items, or lastly, if the auction explicitly says in the description that the item cannot be returned."
                              - heading "Return Instructions" [level=4] [ref=f2e104]
                              - paragraph [ref=f2e105]: Before returning any item, you must message us to get a RMA# (Return Number). We will send you an email with this number, a form to fill out, and a return address to send the item to. Please write this number on at least three sides of the return box to ensure that the package clears security. Keep your purchase, accessories, security tags if provided, and all packing materials in new condition to avoid refusal of the returned merchandise. Items received "Not as Described"
                              - paragraph [ref=f2e106]: Please notify us within 5 Business Days of purchase if there is a significant discrepancy with an order. Please inspect all packages when they are received.
